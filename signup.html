<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMate - Create Account</title>
    <link rel="stylesheet" href="src/public/css/form.css">
    <script type="module" src="src/js/signup-form.js" defer></script>
</head>

<body>
    <main class="container">
        <h1>Create your account</h1>
        <p class="form-copy">Join CineMate to save favorites, track trailers, and pick up where you left off.</p>

        <form id="signup-form" action="/api/register" method="POST" novalidate>
            <div class="field">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Choose a username" autocomplete="username"
                    required minlength="3">
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" autocomplete="email"
                    required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Create a password"
                    autocomplete="new-password" required minlength="8">
                <p class="helper-text">Use at least 8 characters for a stronger password.</p>
            </div>

            <p id="form-message" class="form-message" aria-live="polite"></p>

            <button type="submit" id="signup-button">Create account</button>
        </form>

        <div class="signup">
            <p>Already have an account? <a href="index.html">Login</a></p>
        </div>
    </main>
</body>

</html>
