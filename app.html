<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Kevin Mbemba" />
    <meta name="description" content="CineMate App - a movie search and filter app by Kevin Mbemba." />
    <meta property="og:site_name" content="CineMate App" />
    <meta property="og:title" content="CineMate App" />
    <meta property="og:description"
        content="Explore movies, filter by genre, year and rating, and connect with Kevin Mbemba via GitHub, Facebook and LinkedIn." />
    <meta property="og:type" content="website" />
    <meta property="profile:first_name" content="Kevin" />
    <meta property="profile:last_name" content="Mbemba" />
    <meta property="profile:username" content="snipercoder96" />
    <meta property="profile:gender" content="male" />

    <title>CineMate App</title>
    <link rel="shortcut icon" href="./src/assets/images/cinemate.svg" type="image/x-icon" /><!-- Favicon icon -->

    <!-- Normalise css-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-oHDEc8XedU5l9z1FMvx6bMpiKFFitvolG/Gp2gbf+5Q5e0siJmq9hw3rroWAtxEvsC0RTwEuk+qS0b+T1rUJ0w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Global css -->
    <link rel="stylesheet" href="./src/public/css/style.css" />

    <script type="module" src="./src/js/App.js" defer></script>
    <script type="module" src="./src/js/mobile.js" defer></script>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="header-name">
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation menu"
                title="Toggle navigation menu">☰</button>
            <div>
                <img src="./src/assets/images/cinemate.svg" alt="An svg icon on my app" width="40" height="50">
                <h1>CineMate | Home</h1>
            </div>
        </div>

        <div class="search-section">
            <!-- Search Section -->
            <section id="search-section">
                <input type="text" id="search-input" placeholder="Enter movie title..."
                    title="Enter movie title to search" />
                <button id="search-btn" aria-label="Search movies" title="Search for movies"></button>
            </section>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Filter Section -->
        <section id="filter-section">
            <div class="filter-container">
                <select id="genre-filter" title="Filter by genre">
                    <option value="">All Genres</option>
                </select>

                <select id="year-filter" title="Filter by year">
                    <option value="">All Years</option>
                </select>

                <select id="rating-filter" title="Filter by rating">
                    <option value="">All Ratings</option>
                </select>

                <button id="reset-filter" title="Reset filters">Reset</button>
            </div>
        </section>

        <!-- Movies Display -->
        <section id="movies-section">
            <div id="movies-container"></div>
        </section>
    </main>

    <!-- Favorites Link -->
    <div class="favorites-link">
        <a href="./src/Favorites/favorites.html" title="Go to Favorites">❤️ Favorites</a>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 CineMate. All rights reserved.</p>
    </footer>
</body>

</html>
